services:
  db:
    image: docker.io/library/postgres:18-alpine
    container_name: hunt_db
    restart: always
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
  redis:
    image: docker.io/library/redis:8-alpine
    container_name: hunt_redis
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "2m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 64M
  api:
    image: ghcr.io/q-user/smart-hunt:latest
    container_name: hunt_api
    restart: always
    command: uvicorn src.presentation.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 300M
  celery_worker:
    image: ghcr.io/q-user/smart-hunt:latest
    container_name: hunt_worker
    restart: always
    command: celery -A infrastructure.task_queue.celery_app worker -l info --concurrency=1
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgrespassword@db:5432/smarthunt_db
      - REDIS_URL=redis://redis:6379/0
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 256M
volumes:
  db-data:

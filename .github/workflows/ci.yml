name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: smarthunt_test_db
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy core/ infrastructure/ presentation/
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/smarthunt_test_db
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest

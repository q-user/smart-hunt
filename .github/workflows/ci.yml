name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: smarthunt_test_db
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src/
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/smarthunt_test_db
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest
  deploy:
    name: Deploy to VPS via Archive
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create deployment archive
        run: |
          mkdir -p build_output
          tar -czf build_output/release.tar.gz \
            --exclude=build_output \
            --exclude=.git \
            --exclude=.github \
            --exclude=.venv \
            --exclude=.idea \
            --exclude=.gemini \
            --exclude=.qwen \
            --exclude=.specify \
            --exclude=__pycache__ \
            --exclude=.mypy_cache \
            --exclude=.pytest_cache \
            --exclude=.ruff_cache \
            --exclude=tests \
            --exclude=LICENSE \
            --exclude=docker-compose.dev.yml \
            .
          ls -lh build_output/release.tar.gz
      - name: Copy file via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          port: 22
          source: "build_output/release.tar.gz"
          target: "/opt/smart-hunt"
          strip_components: 1 # Убирает 'build_output/' из пути на сервере
      - name: Extract and Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /opt/smart-hunt

            podman-compose down || true
            podman system prune -af --volumes # Clear old images/cache to make room for the new build
            find . -mindepth 1 -maxdepth 1 ! -name 'release.tar.gz' ! -name '.env' -exec rm -rf {} +
            tar -xzf release.tar.gz
            rm release.tar.gz
            podman-compose --podman-args "--cgroup-manager cgroupfs" up -d --build
            df -h /

name: CI/CD Smart Hunt
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Разрешаем пуш в GitHub Container Registry
permissions:
  contents: read
  packages: write
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: smarthunt_test_db
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --frozen --all-groups
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src/
      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/smarthunt_test_db
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest
  build-and-push:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Добавляем шаг для приведения названия репозитория к нижнему регистру
      - name: Lowercase repo name
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest
  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # На сервере уже должна быть папка /opt/smart-hunt с нужными правами
      - name: Copy docker-compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          source: "docker-compose.yml"
          target: "/opt/smart-hunt"
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            cd /opt/smart-hunt

            # 1. Логин (теперь через docker)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. Подготовка переменных
            export REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export IMAGE_NAME="ghcr.io/${REPO_LOWER}:latest"

            # 3. Обновление образов
            docker builder prune -f
            docker compose pull

            # 4. Очистка ВСЕГО лишнего перед перезапуском (освобождаем место под новые слои)
            # Удалит старые слои, которые больше не используются новым образом
            docker compose down || true
            docker system prune -af --volumes || true

            # 5. Запуск
            IMAGE_NAME=$IMAGE_NAME docker compose up -d

            # 6. Проверка
            docker ps
            df -h /
